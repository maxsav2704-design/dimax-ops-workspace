name: dimaxoperationssuite_test

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dimax
    volumes:
      - workspace_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dimax"]
      interval: 3s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - workspace_test_minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/dimax || true &&
      mc anonymous set download local/dimax || true &&
      echo 'MinIO bucket ready';
      "

  api:
    image: dimaxoperationssuite-api
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/dimax
      PUBLIC_BASE_URL: http://localhost:8000
      CORS_ALLOW_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: dimax
      MINIO_SECURE: "false"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio_init:
        condition: service_completed_successfully
    volumes:
      - ./backend:/app
    command: python -m pytest -q tests/integration/test_openapi_contract.py

volumes:
  workspace_test_pgdata:
  workspace_test_minio_data:
