services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dimax}
    ports:
      - "${DEMO_DB_PORT:-5435}:5432"
    volumes:
      - demo_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dimax}"]
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "${DEMO_MINIO_PORT:-9020}:9000"
      - "${DEMO_MINIO_CONSOLE_PORT:-9021}:9001"
    volumes:
      - demo_minio_data:/data

  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_BUCKET} || true &&
      mc anonymous set download local/${MINIO_BUCKET} || true &&
      echo 'MinIO bucket ready';
      "

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: ${APP_ENV:-demo}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-dimax}
      JWT_SECRET: ${JWT_SECRET}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: "false"
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      EMAIL_ENABLED: ${EMAIL_ENABLED:-false}
      WHATSAPP_ENABLED: ${WHATSAPP_ENABLED:-false}
      WHATSAPP_FALLBACK_TO_EMAIL: ${WHATSAPP_FALLBACK_TO_EMAIL:-true}
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
      minio_init:
        condition: service_completed_successfully
    ports:
      - "${DEMO_API_PORT:-8000}:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  admin:
    build:
      context: ./dimax-operations-suite-main
      dockerfile: Dockerfile.demo
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NODE_ENV: production
    depends_on:
      - api
    ports:
      - "${DEMO_ADMIN_PORT:-5173}:5173"

volumes:
  demo_pgdata:
  demo_minio_data:
